name: Deploy Bank Webhook

on:
  push:
    branches: [main]
    paths: # ✅ only trigger if these change
      - "apps/bank-webhook/**"
      - "packages/**"
      - "package.json"
      - "package-lock.json"
      - "turbo.json"
      - "docker-compose.yml"
      - "Dockerfile"
      - ".npmrc"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd /home/ubuntu/apps/paypi
            git pull origin main
            docker compose up -d --build
            docker image prune -f
