services:
  # ── bank-external: axis ───────────────────────────────
  - type: web
    name: bank-external-axis
    runtime: static
    rootDir: apps/bank-external
    buildCommand: echo "No build needed"
    staticPublishPath: ./axis
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    buildFilter:
      paths:
        - apps/bank-external/axis/**

  # ── bank-external: icici ──────────────────────────────
  - type: web
    name: bank-external-icici
    runtime: static
    rootDir: apps/bank-external
    buildCommand: echo "No build needed"
    staticPublishPath: ./icici
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    buildFilter:
      paths:
        - apps/bank-external/icici/**

  # ── bank-webhook (Node.js) ────────────────────────────
  - type: web
    name: bank-webhook
    runtime: node
    plan: free
    rootDir: apps/bank-webhook
    buildCommand: cd ../.. && npm install && npx turbo run build --filter=bank-webhook
    startCommand: node src/server.js
    buildFilter:
      paths:
        - apps/bank-webhook/**
        - packages/**
        - turbo.json
        - package.json
    envVars:
      - key: NODE_ENV
        value: production

  # ── user-app (Next.js) ────────────────────────────────
  - type: web
    name: paypi
    runtime: node
    plan: free
    rootDir: apps/user-app
    buildCommand: cd ../.. && npm install && npx turbo run build --filter=@repo/user-app
    startCommand: npm start
    buildFilter:
      paths:
        - apps/user-app/**
        - packages/**
        - turbo.json
        - package.json
    envVars:
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
